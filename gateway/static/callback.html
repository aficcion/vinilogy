<!DOCTYPE html>
<html>

<head>
    <title>Conectando...</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #0E0F0C;
            color: #E8E6DF;
        }

        .container {
            text-align: center;
            padding: 2.5rem 2rem;
            background: #181918;
            border: 0.5px solid rgba(232,230,223,0.1);
            border-radius: 18px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(232,230,223,0.12);
            border-top: 2px solid #F2D377;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.4rem;
            font-weight: 500;
            color: #E8E6DF;
            letter-spacing: -0.01em;
        }

        p {
            margin: 0.25rem 0 0;
            color: rgba(232,230,223,0.55);
            font-size: 0.9rem;
        }

        .check-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: rgba(127,224,138,0.12);
            border: 0.5px solid rgba(127,224,138,0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
            font-size: 1.4rem;
        }

        .error-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: rgba(239,68,68,0.1);
            border: 0.5px solid rgba(239,68,68,0.25);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
            font-size: 1.4rem;
        }

        .success h1 { color: #7FE08A; }
        .error h1   { color: #f87171; }

        button {
            margin-top: 1.25rem;
            padding: 0.65rem 1.5rem;
            background: rgba(242,211,119,0.1);
            color: #F2D377;
            border: 0.5px solid rgba(242,211,119,0.3);
            border-radius: 999px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.15s;
        }

        button:hover {
            background: rgba(242,211,119,0.18);
            border-color: rgba(242,211,119,0.5);
        }
    </style>
</head>

<body>
    <div class="container" id="container">
        <div class="spinner"></div>
        <h1 id="status-title">Conectando...</h1>
        <p>Por favor espera un momento</p>
        <p style="margin-top:1rem;font-size:0.8rem;opacity:0.35">Vinylbe</p>
    </div>

    <script>
        async function processCallback() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token'); // Last.fm
            const oauth_token = params.get('oauth_token'); // Discogs
            const oauth_verifier = params.get('oauth_verifier'); // Discogs

            if (token) {
                // LAST.FM FLOW
                document.getElementById('status-title').textContent = 'Conectando con Last.fm...';
                await handleLastFm(token);
            } else if (oauth_token && oauth_verifier) {
                // DISCOGS FLOW
                document.getElementById('status-title').textContent = 'Conectando con Discogs...';
                await handleDiscogs(oauth_token, oauth_verifier);
            } else {
                showError('No se recibieron parámetros de autenticación válidos.');
            }
        }

        async function collectGuestData() {
            // Reused logic for gathering guest data from localStorage
            console.log('[Sync Debug] === STARTING GUEST DATA COLLECTION ===');

            // 1. Collect album statuses
            const albumStatuses = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('album_status_')) {
                    const statusKey = key.replace('album_status_', '').replace('::', '|');
                    albumStatuses[statusKey] = localStorage.getItem(key);
                }
            }

            // 2. Collect selected artists
            const selectedArtistNames = localStorage.getItem('selected_artist_names');
            let selectedArtists = [];
            if (selectedArtistNames) {
                try {
                    selectedArtists = JSON.parse(selectedArtistNames);
                } catch (e) { console.error(e); }
            }

            // 3. Collect recommendations
            const lastRecommendations = localStorage.getItem('last_recommendations');
            let recommendations = [];
            if (lastRecommendations) {
                try {
                    recommendations = JSON.parse(lastRecommendations);
                } catch (e) { console.error(e); }
            }

            // 4. Collect manually added albums
            const manuallyAddedAlbums = [];
            const guestUserId = localStorage.getItem('userId');
            if (guestUserId && guestUserId !== 'null') {
                try {
                    const albumsResp = await fetch(`/api/users/${guestUserId}/recommendations`);
                    if (albumsResp.ok) {
                        const allRecs = await albumsResp.json();
                        const manualAlbums = allRecs.filter(rec => rec.source === 'manual');
                        manuallyAddedAlbums.push(...manualAlbums);
                    }
                } catch (e) { console.error(e); }
            }

            const payload = {};
            if (Object.keys(albumStatuses).length > 0) payload.album_statuses = albumStatuses;
            if (selectedArtists.length > 0) payload.selected_artists = selectedArtists;
            if (recommendations.length > 0) payload.recommendations = recommendations;
            if (manuallyAddedAlbums.length > 0) payload.manually_added_albums = manuallyAddedAlbums;

            return payload;
        }

        async function handleLastFm(token) {
            try {
                const response = await fetch(`/auth/lastfm/callback?token=${token}`);
                const data = await response.json();

                if (response.ok && data.status === 'ok' && data.username) {
                    // Update LocalStorage
                    localStorage.setItem('lastfm_username', data.username);

                    // Guest Sync
                    const guestData = await collectGuestData();

                    // Check for existing user ID (for account linking)
                    const existingUserId = localStorage.getItem('userId');

                    const payload = {
                        lastfm_username: data.username,
                        user_id: existingUserId ? parseInt(existingUserId) : null,
                        ...guestData
                    };

                    const authRes = await fetch('/auth/lastfm', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const authData = await authRes.json();
                    if (authData.user_id) localStorage.setItem('userId', authData.user_id);

                    showSuccess(data.username);
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    showError('Last.fm authentication failed.');
                }
            } catch (e) {
                console.error(e);
                showError('Error connecting to Last.fm.');
            }
        }

        async function handleDiscogs(oauth_token, oauth_verifier) {
            try {
                // Check if this is a LINK operation or a LOGIN operation?
                // For simplicity, we assume LOGIN unless we track state.
                // However, the backend /auth/discogs/callback handles login/signup/merge.
                // If it was a LINK operation, we should have known. 
                // BUT: OAuth 1.0a doesn't easily pass state through params without us handling it manually in callback URL.
                // The current implementation in backend `discogs_finalize` does `get_or_create_user_via_discogs`.
                // It does NOT link to *current* user automatically unless we pass current user ID.
                // To support LINKING, when we start flow, we should perhaps set a flag in localStorage 'pending_discogs_link_user_id'.

                const pendingLinkUserId = localStorage.getItem('pending_discogs_link_user_id');

                if (pendingLinkUserId) {
                    // LINKING FLOW
                    const linkPayload = {
                        user_id: parseInt(pendingLinkUserId),
                        oauth_token: oauth_token,
                        oauth_verifier: oauth_verifier
                    };
                    const linkRes = await fetch('/auth/discogs/link', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(linkPayload)
                    });

                    if (linkRes.ok) {
                        localStorage.removeItem('pending_discogs_link_user_id'); // Clear flag
                        const data = await linkRes.json();
                        showSuccess(data.username + ' (Linked)');
                        // Close popup if applicable, or redirect
                        if (window.opener) {
                            window.opener.postMessage({ type: 'DISCOGS_LINK_SUCCESS', username: data.username }, '*');
                            window.close();
                        } else {
                            setTimeout(() => window.location.href = '/', 2000);
                        }
                    } else {
                        showError('Failed to link Discogs account.');
                    }

                } else {
                    // LOGIN/SIGNUP/LINK FLOW (Unified)
                    const guestData = await collectGuestData();

                    // Check for existing user ID
                    const existingUserId = localStorage.getItem('userId');

                    const payload = {
                        oauth_token: oauth_token,
                        oauth_verifier: oauth_verifier,
                        user_id: existingUserId ? parseInt(existingUserId) : null,
                        ...guestData
                    };

                    const authRes = await fetch('/auth/discogs/callback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (authRes.ok) {
                        const data = await authRes.json();

                        // Always set localStorage (shared across tabs/windows of same origin)
                        localStorage.setItem('userId', data.user_id);
                        localStorage.setItem('discogs_username', data.username);
                        localStorage.setItem('vinilogy_discogs_auth_completed', 'true');

                        showSuccess(data.username);

                        // Handle popup flow
                        if (window.opener) {
                            // Send data to main window (trigger reload)
                            window.opener.postMessage({
                                type: 'DISCOGS_AUTH_SUCCESS',
                                payload: {
                                    user_id: data.user_id,
                                    username: data.username,
                                    completed_flag: 'true'
                                }
                            }, '*');

                            setTimeout(() => window.close(), 1500);
                        } else {
                            // Fallback for redirect loop
                            setTimeout(() => window.location.href = '/', 2000);
                        }
                    } else {
                        showError('Discogs authentication failed.');
                    }
                }

            } catch (e) {
                console.error(e);
                showError('Error connecting to Discogs.');
            }
        }

        function showSuccess(username) {
            const container = document.getElementById('container');
            container.className = 'container success';
            container.innerHTML = `
                <div class="check-icon">✓</div>
                <h1>¡Conectado!</h1>
                <p>Bienvenido, ${username}</p>
                <p style="margin-top:0.5rem">Redirigiendo...</p>
            `;
        }

        function showError(message) {
            const container = document.getElementById('container');
            container.className = 'container error';
            container.innerHTML = `
                <div class="error-icon">✗</div>
                <h1>Error de autenticación</h1>
                <p>${message}</p>
                <button onclick="window.location.href='/'">Volver al inicio</button>
            `;
        }

        // Start processing when page loads
        processCallback();
    </script>
</body>

</html>
