<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Vinilogy{% endblock %}</title>
  <script>
    /* Tema antes de pintar (evita el flash): preferencia guardada, o papel por defecto. */
    (function () {
      try {
        var t = localStorage.getItem("vb-theme");
        document.documentElement.setAttribute("data-theme", t || "light");
      } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=25">
</head>
<body data-auth="{{ 'user' if user else 'anon' }}">
  <header class="topbar">
    <a class="brand" href="/">Vinilogy<span class="brand-v2">v2</span></a>
    <form class="search" action="/buscar" method="get" role="search" data-typeahead>
      <input type="search" name="q" value="{{ q|default('') }}"
             placeholder="Busca un disco o un artista…" autocomplete="off">
      <button type="submit">Buscar</button>
    </form>
    <a class="nav-vibra" href="/vibra">Por vibra ✦</a>
    <nav class="topbar-user">
      <a class="nav-wish" href="/wishlist" aria-label="Tu wishlist">
        <span aria-hidden="true">♥</span> Wishlist<span class="nav-wish-count" hidden></span>
      </a>
      <button class="theme-toggle" type="button" aria-label="Cambiar tema" onclick="vbToggleTheme()">◐</button>
      {% if user %}
        <a class="nav-mi" href="/mi">{{ display_label }}</a>
        <a class="nav-connect" href="/cuenta">Cuenta</a>
        <form class="inline-form" action="/auth/logout" method="post">
          <button class="linkish" type="submit">Salir</button>
        </form>
      {% else %}
        <a class="nav-enter" href="/cuenta">Entrar o crear cuenta</a>
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>Vinilogy v2 · M3a · datos de <code>vinology_core</code></span>
  </footer>
  <script>
    function vbToggleTheme() {
      var cur = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
      var next = cur === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      try { localStorage.setItem("vb-theme", next); } catch (e) {}
    }
    // "Ver más": revela el pool completo de una sección (quita el colapso del grid
    // hermano anterior) y retira el botón. Delegado, un solo listener.
    document.addEventListener("click", function (e) {
      var btn = e.target.closest("[data-more]");
      if (!btn) return;
      var row = btn.closest(".more-row");
      var grid = row && row.previousElementSibling;
      if (grid && grid.classList.contains("grid")) grid.classList.remove("is-collapsed");
      if (row) row.remove();
    });
  </script>
  <script src="/static/search.js?v=12" defer></script>
  <script src="/static/wishlist.js?v=2" defer></script>
</body>
</html>
