# Railway — despliegue de Vinilogy v2 (app única FastAPI; el v1 era multi-servicio).
# Las VARIABLES DE ENTORNO se configuran en el panel de Railway, NO aquí (ver
# docs/deploy-railway.md). Nada de secretos en el repo.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# 1 worker a propósito (FlowStore OAuth en memoria). --proxy-headers: IP real tras el
# proxy de Railway. Railway sustituye $PORT.
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
